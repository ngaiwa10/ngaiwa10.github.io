        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;

        }

            background: #4b5563; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; 
        }

        /* Animation for playing state */
        .playing-indicator span {
            display: inline-block;
            width: 3px;
            height: 10px;
            background-color: #10b981;
            margin: 0 1px;
            animation: bounce 0.5s infinite ease-in-out alternate;
        }
        .playing-indicator span:nth-child(2) { animation-delay: 0.1s; }
        .playing-indicator span:nth-child(3) { animation-delay: 0.2s; }
        .playing-indicator span:nth-child(4) { animation-delay: 0.3s; }

        @keyframes bounce {
            0% { height: 5px; opacity: 0.5; }
            100% { height: 15px; opacity: 1; }
        }

        /* List item active state transition */
        .station-item {
            transition: all 0.2s ease;
        }

        // State Management
        let currentIndex = -1; // -1 means no station selected initially
        let isPlaying = false;
        
        // DOM Elements
        const audioPlayer = document.getElementById('audio-player');
        const stationListEl = document.getElementById('station-list');
        const currentStationNameEl = document.getElementById('current-station-name');
        const btnPlay = document.getElementById('btn-play');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const textPlay = document.getElementById('text-play');
        const visualizer = document.getElementById('visualizer');
        const statusText = document.getElementById('status-text');

        // Initialize the list
        function initList() {
            stationListEl.innerHTML = '';
            radioStations.forEach((station, index) => {
                const li = document.createElement('li');
                li.className = 'station-item bg-gray-800 rounded-lg p-3 cursor-pointer hover:bg-gray-700 flex justify-between items-center group';
                li.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center shrink-0 text-gray-400 group-hover:text-emerald-400 transition-colors">
                            <i class="fa-solid fa-music text-sm"></i>
                        </div>
                        <span class="truncate text-sm sm:text-base font-medium text-gray-200 group-hover:text-white">${station.name}</span>
                    </div>
                    <div class="status-icon text-emerald-500 opacity-0 transition-opacity">
                        <i class="fa-solid fa-volume-high"></i>
                    </div>
                `;
                li.onclick = () => selectStation(index);
                stationListEl.appendChild(li);
            });
        }

        // Update UI for the active station in the list
        function updateListUI() {
            const items = stationListEl.children;
            for (let i = 0; i < items.length; i++) {
                const icon = items[i].querySelector('.status-icon');
                if (i === currentIndex) {
                    items[i].classList.add('active');
                    items[i].classList.remove('bg-gray-800');
                    icon.classList.remove('opacity-0');
                    // Scroll to the active item
                    items[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    items[i].classList.remove('active');
                    items[i].classList.add('bg-gray-800');
                    icon.classList.add('opacity-0');
                }
            }
        }

        // Update Player Control UI
        function updatePlayerUI() {
            const station = radioStations[currentIndex];
            if (station) {
                currentStationNameEl.textContent = station.name;
            }

            if (isPlaying) {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                textPlay.textContent = "暂停";
                visualizer.classList.remove('opacity-0');
                statusText.textContent = "正在播放";
            } else {
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
                textPlay.textContent = "播放";
                visualizer.classList.add('opacity-0');
                statusText.textContent = "已暂停";
            }
        }

        // Select a station
        function selectStation(index) {
            if (index < 0 || index >= radioStations.length) return;
            
            // If clicking the same station, just toggle play/pause
            if (currentIndex === index) {
                togglePlay();
                return;
            }

            currentIndex = index;
            const station = radioStations[currentIndex];
            
            // Load new source
            audioPlayer.src = station.url;
            audioPlayer.load();
            
            // Auto play on selection
            playAudio();
            
            updateListUI();
            updatePlayerUI();
        }

        // Play Logic
        function playAudio() {
            if (currentIndex === -1) {
                // If no station selected, select the first one
                selectStation(0);
                return;
            }

            const playPromise = audioPlayer.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    isPlaying = true;
                    updatePlayerUI();
                })
                .catch(error => {
                    console.error("Playback failed:", error);
                    isPlaying = false;
                    updatePlayerUI();
                    statusText.textContent = "加载失败或被拦截";
                });
            }
        }

        // Pause Logic
        function pauseAudio() {
            audioPlayer.pause();
            isPlaying = false;
            updatePlayerUI();
        }

        // Toggle Play/Pause
        function togglePlay() {
            if (currentIndex === -1) {
                selectStation(0);
            } else {
                if (isPlaying) {
                    pauseAudio();
                } else {
                    playAudio();
                }
            }
        }

        // Next Station
        function nextStation() {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= radioStations.length) {
                nextIndex = 0; // Loop back to start
            }
            selectStation(nextIndex);
        }

        // Previous Station
        function prevStation() {
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) {
                prevIndex = radioStations.length - 1; // Loop to end
            }
            selectStation(prevIndex);
        }

        // Event Listeners
        btnPlay.addEventListener('click', togglePlay);
        btnNext.addEventListener('click', nextStation);
        btnPrev.addEventListener('click', prevStation);

        // Audio Event Listeners for state sync
        audioPlayer.addEventListener('playing', () => {
            isPlaying = true;
            updatePlayerUI();
        });

        audioPlayer.addEventListener('pause', () => {
            isPlaying = false;
            updatePlayerUI();
        });

        audioPlayer.addEventListener('ended', () => {
            // Auto play next if current stream ends (rare for live radio, but possible for clips)
            nextStation();
        });

        audioPlayer.addEventListener('error', (e) => {
            console.error("Audio Error:", e);
            statusText.textContent = "信号连接错误";
            isPlaying = false;
            updatePlayerUI();
        });

        audioPlayer.addEventListener('waiting', () => {
            statusText.textContent = "缓冲中...";
        });

        // Initialize App
        initList();

    </script>
